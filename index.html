<script>
        // ... (Keep the existing API_URL, cats, mode, and other functions as they are) ...

        form.onsubmit = async (e) => {
            e.preventDefault();
            
            // 1. Give immediate feedback that it's processing
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = "Saving...";

            const payload = {
                action: document.getElementById('submit-btn').textContent === "Update Transaction" ? 'edit' : 'add',
                index: document.getElementById('edit-index').value,
                date: document.getElementById('date').value,
                type: mode,
                category: document.getElementById('category').value,
                amount: document.getElementById('amount').value
            };

            try {
                await fetch(API_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify(payload) 
                });

                // 2. Success Feedback
                alert("Transaction successfully saved!");
                
                form.reset();
                document.getElementById('edit-index').value = "";
                submitBtn.textContent = "Save Transaction";
                submitBtn.disabled = false;
                
                // Refresh table to show the new data
                loadData();
            } catch (error) {
                alert("Error saving transaction. Please check your internet.");
                submitBtn.disabled = false;
                submitBtn.textContent = "Save Transaction";
            }
        };

        // ... (rest of your existing loadData, updateCats, etc.)
    </script>
