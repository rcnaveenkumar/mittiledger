<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mitti Studio Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-50 p-4 max-w-sm mx-auto min-h-screen">
    <header class="mb-6 text-center"><h1 class="font-bold text-xl text-stone-800">Mitti Studio Ledger</h1></header>

    <form id="tx-form" class="bg-white p-5 rounded-3xl shadow-sm border border-stone-100 space-y-4 mb-8">
        <input type="hidden" id="edit-index">
        <div class="flex p-1 bg-stone-100 rounded-xl">
            <button type="button" id="type-inc" class="flex-1 py-2 text-xs font-bold rounded-lg bg-white shadow-sm">Income</button>
            <button type="button" id="type-exp" class="flex-1 py-2 text-xs font-bold text-stone-500">Expense</button>
        </div>
        <input type="date" id="date" required class="w-full p-3 bg-stone-50 rounded-xl border border-stone-200">
        <select id="category" class="w-full p-3 bg-stone-50 rounded-xl border border-stone-200 text-sm"></select>
        <input type="text" id="description" placeholder="Description/Comment" class="w-full p-3 bg-stone-50 rounded-xl border border-stone-200">
        <input type="number" id="amount" placeholder="Amount (₹)" required class="w-full p-3 bg-stone-50 rounded-xl border border-stone-200 font-bold">
        <button type="submit" id="submit-btn" class="w-full bg-stone-800 text-white py-3 rounded-xl font-bold">Save Transaction</button>
    </form>

    <div id="table-container" class="space-y-6"></div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyVnIp2ehLRKamPJCksTGcctS2cEGr7d8V7-BWsW3VB8Fy344zaEBNbrcCAu0tO26nT_A/exec";
        const cats = {
            'Income': ['Workshops', 'Custom Orders', 'Retail Sales', 'Gift Vouchers', 'Other'],
            'Expense': ['Raw Materials', 'Firing Costs', 'Studio Rent', 'Utilities', 'Marketing', 'Misc']
        };
        let mode = 'Income';
        const form = document.getElementById('tx-form');
        document.getElementById('date').valueAsDate = new Date();
        
        function updateCats() { document.getElementById('category').innerHTML = cats[mode].map(c => `<option value="${c}">${c}</option>`).join(''); }
        document.getElementById('type-inc').onclick = () => { mode = 'Income'; updateCats(); };
        document.getElementById('type-exp').onclick = () => { mode = 'Expense'; updateCats(); };

        async function loadData() {
            const container = document.getElementById('table-container');
            container.innerHTML = "<p class='text-center text-stone-400 text-sm'>Loading history...</p>";
            
            const res = await fetch(API_URL);
            const data = await res.json();
            data.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            const grouped = data.reduce((acc, d) => {
                const month = new Date(d.date).toLocaleString('default', { month: 'long', year: 'numeric' });
                if (!acc[month]) acc[month] = [];
                acc[month].push(d);
                return acc;
            }, {});

            container.innerHTML = Object.keys(grouped).map((month, index) => `
                <details ${index === 0 ? 'open' : ''} class="group">
                    <summary class="text-[10px] font-bold text-stone-400 uppercase tracking-widest mb-3 ml-1 cursor-pointer list-none flex justify-between items-center">
                        ${month}
                        <span class="text-[10px] group-open:rotate-180 transition-transform">▼</span>
                    </summary>
                    <div class="space-y-2 mb-6">
                        ${grouped[month].map((d, i) => `
                            <div class="bg-white p-4 rounded-2xl border border-stone-100 flex justify-between items-center shadow-sm">
                                <div>
                                    <p class="text-[10px] font-bold text-stone-500 uppercase">${d.date} • ${d.category}</p>
                                    <p class="text-xs font-semibold text-stone-800">${d.description || 'No comment'}</p>
                                    <p class="text-sm font-black mt-1 ${d.type === 'Income' ? 'text-emerald-600' : 'text-rose-600'}">
                                        ${d.type === 'Income' ? '+' : '-'} ₹${d.amount}
                                    </p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </details>
            `).join('');
        }

        form.onsubmit = async (e) => { 
            e.preventDefault(); 
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.textContent = "Saving...";
            
            const payload = { 
                action: 'add',
                date: document.getElementById('date').value, 
                type: mode, 
                category: document.getElementById('category').value, 
                description: document.getElementById('description').value, 
                amount: document.getElementById('amount').value 
            }; 
            
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) }); 
            alert("Success! Transaction recorded.");
            form.reset(); 
            submitBtn.textContent = "Save Transaction";
            loadData(); 
        };

        updateCats(); 
        loadData();
    </script>
</body>
</html>
