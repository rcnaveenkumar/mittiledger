<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mitti Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-50 p-4 max-w-sm mx-auto min-h-screen box-border">
    <header class="mb-6 text-center"><h1 class="font-bold text-xl text-stone-800 tracking-tight">Mitti Studio Ledger</h1></header>

    <form id="tx-form" class="bg-white p-5 rounded-3xl shadow-sm border border-stone-100 space-y-4 mb-8 w-full box-border">
        <div class="flex p-1 bg-stone-100 rounded-xl w-full box-border">
            <button type="button" id="type-inc" class="flex-1 py-2 text-xs font-bold rounded-lg bg-white shadow-sm transition-all">Income</button>
            <button type="button" id="type-exp" class="flex-1 py-2 text-xs font-bold text-stone-500 transition-all">Expense</button>
        </div>
        <div class="w-full box-border">
            <input type="date" id="date" required class="w-full p-3 bg-stone-50 rounded-xl border border-stone-200 text-stone-800 text-sm focus:outline-none focus:ring-1 focus:ring-stone-400">
        </div>
        <div class="w-full box-border">
            <select id="category" class="w-full p-3 bg-stone-50 rounded-xl border border-stone-200 text-sm text-stone-800 focus:outline-none focus:ring-1 focus:ring-stone-400"></select>
        </div>
        <div class="w-full box-border">
            <input type="text" id="description" placeholder="Description/Comment" class="w-full p-3 bg-stone-50 rounded-xl border border-stone-200 text-sm focus:outline-none focus:ring-1 focus:ring-stone-400">
        </div>
        <div class="w-full box-border">
            <input type="number" id="amount" placeholder="Amount (₹)" required class="w-full p-3 bg-stone-50 rounded-xl border border-stone-200 font-bold text-stone-900 focus:outline-none focus:ring-1 focus:ring-stone-400">
        </div>
        <button type="submit" id="submit-btn" class="w-full bg-stone-800 text-white py-3.5 rounded-xl font-bold text-sm active:bg-stone-900 transition-colors">Save Transaction</button>
    </form>

    <div id="table-container" class="space-y-4 w-full box-border"></div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyVnIp2ehLRKamPJCksTGcctS2cEGr7d8V7-BWsW3VB8Fy344zaEBNbrcCAu0tO26nT_A/exec";
        
        let allTransactions = [];
        let monthsToDisplay = 2; // Default view load target
        let mode = 'Income';
        
        const cats = {
            'Income': ['Workshops', 'Custom Orders', 'Retail Sales', 'Gift Vouchers', 'Other'], 
            'Expense': ['Raw Materials', 'Firing Costs', 'Studio Rent', 'Utilities', 'Marketing', 'Misc']
        };
        
        document.getElementById('date').valueAsDate = new Date();
        function updateCats() { document.getElementById('category').innerHTML = cats[mode].map(c => `<option value="${c}">${c}</option>`).join(''); }
        
        document.getElementById('type-inc').onclick = () => { 
            mode = 'Income'; 
            document.getElementById('type-inc').className = "flex-1 py-2 text-xs font-bold rounded-lg bg-white shadow-sm text-stone-800";
            document.getElementById('type-exp').className = "flex-1 py-2 text-xs font-bold text-stone-500";
            updateCats(); 
        };
        document.getElementById('type-exp').onclick = () => { 
            mode = 'Expense'; 
            document.getElementById('type-exp').className = "flex-1 py-2 text-xs font-bold rounded-lg bg-white shadow-sm text-stone-800";
            document.getElementById('type-inc').className = "flex-1 py-2 text-xs font-bold text-stone-500";
            updateCats(); 
        };

        async function fetchAllData() {
            const container = document.getElementById('table-container');
            container.innerHTML = "<p class='text-center text-stone-400 text-xs py-4'>Loading transaction history...</p>";
            try {
                const res = await fetch(API_URL);
                allTransactions = await res.json();
                renderLedger();
            } catch (err) {
                container.innerHTML = "<p class='text-center text-red-400 text-xs py-4'>Connection timeout. Pull down to refresh.</p>";
            }
        }

        function renderLedger() {
            const container = document.getElementById('table-container');
            if (allTransactions.length === 0) {
                container.innerHTML = "<p class='text-center text-stone-400 text-xs py-4'>No historical logs found.</p>";
                return;
            }

            // Client-side grouping execution
            const grouped = allTransactions.reduce((acc, d) => {
                const mKey = new Date(d.date).toLocaleString('default', { month: 'long', year: 'numeric' });
                if (!acc[mKey]) acc[mKey] = [];
                acc[mKey].push(d);
                return acc;
            }, {});

            const sortedMonths = Object.keys(grouped);
            const visibleMonths = sortedMonths.slice(0, monthsToDisplay);

            let htmlOutput = visibleMonths.map((month, idx) => `
                <details ${idx === 0 ? 'open' : ''} class="group bg-white p-4 rounded-2xl border border-stone-100 shadow-sm transition-all">
                    <summary class="text-[10px] font-black text-stone-400 uppercase tracking-widest cursor-pointer list-none flex justify-between items-center select-none">
                        <span>${month}</span>
                        <span class="text-stone-300 group-open:rotate-180 transition-transform duration-200 text-[8px]">▼</span>
                    </summary>
                    <div class="space-y-3 mt-4 divider-stone-100">
                        ${grouped[month].map(d => `
                            <div class="flex justify-between items-center border-t border-stone-50 pt-3 first:border-0 first:pt-0">
                                <div class="truncate mr-4 min-w-0">
                                    <p class="text-[9px] font-bold text-stone-400 uppercase tracking-tight">${d.date} • ${d.category}</p>
                                    <p class="text-xs font-semibold text-stone-700 truncate mt-0.5">${d.description || '—'}</p>
                                </div>
                                <div class="text-right flex-shrink-0">
                                    <p class="text-xs font-black tracking-tight ${d.type === 'Income' ? 'text-emerald-600' : 'text-rose-600'}">
                                        ${d.type === 'Income' ? '+' : '-'} ₹${d.amount}
                                    </p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </details>
            `).join('');

            // Append incremental pagination trigger natively if history remains hidden
            if (sortedMonths.length > monthsToDisplay) {
                htmlOutput += `
                    <div class="pt-2 pb-8">
                        <button onclick="loadMoreMonths()" class="w-full py-3 bg-white hover:bg-stone-100 border border-stone-200 text-stone-500 rounded-xl text-xs font-bold transition-colors shadow-sm">
                            Load Previous 6 Months
                        </button>
                    </div>`;
            } else {
                htmlOutput += `<p class="text-center text-[10px] text-stone-300 font-medium py-4">End of ledger history</p>`;
            }

            container.innerHTML = htmlOutput;
        }

        function loadMoreMonths() {
            monthsToDisplay += 6;
            renderLedger();
        }

        document.getElementById('tx-form').summary = "";
        document.getElementById('tx-form').onsubmit = async (e) => { 
            e.preventDefault(); 
            const sBtn = document.getElementById('submit-btn');
            sBtn.disabled = true;
            sBtn.textContent = "Writing to Sheet...";
            
            const payload = {
                date: document.getElementById('date').value, 
                type: mode, 
                category: document.getElementById('category').value, 
                description: document.getElementById('description').value, 
                amount: document.getElementById('amount').value
            }; 
            
            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) }); 
                alert("Transaction added successfully!");
                document.getElementById('description').value = "";
                document.getElementById('amount').value = "";
                await fetchAllData();
            } catch(err) {
                alert("Network transaction failed. Check link permissions.");
            } finally {
                sBtn.disabled = false;
                sBtn.textContent = "Save Transaction";
            }
        };

        updateCats(); 
        fetchAllData();
    </script>
</body>
</html>
