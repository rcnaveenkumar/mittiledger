<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mitti Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-50 p-4 max-w-sm mx-auto min-h-screen">
    <header class="mb-6 text-center"><h1 class="font-bold text-xl text-stone-800">Mitti Studio Ledger</h1></header>

    <form id="tx-form" class="bg-white p-5 rounded-3xl shadow-sm border border-stone-100 space-y-4 mb-8">
        <input type="hidden" id="edit-index">
        <div class="flex p-1 bg-stone-100 rounded-xl">
            <button type="button" id="type-inc" class="flex-1 py-2 text-xs font-bold rounded-lg bg-white shadow-sm">Income</button>
            <button type="button" id="type-exp" class="flex-1 py-2 text-xs font-bold text-stone-500">Expense</button>
        </div>
        <input type="date" id="date" required style="display: block; width: 100%; min-width: 0; box-sizing: border-box;" class="h-[50px] p-3 bg-stone-50 rounded-xl border border-stone-200">
        <select id="category" class="w-full p-3 bg-stone-50 rounded-xl border border-stone-200 text-sm"></select>
        <input type="text" id="description" placeholder="Description/Comment" class="w-full p-3 bg-stone-50 rounded-xl border border-stone-200">
        <input type="number" id="amount" placeholder="Amount (₹)" required class="w-full p-3 bg-stone-50 rounded-xl border border-stone-200 font-bold">
        <button type="submit" id="submit-btn" class="w-full bg-stone-800 text-white py-3 rounded-xl font-bold">Save Transaction</button>
    </form>

    <div id="table-container" class="space-y-4"></div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyVnIp2ehLRKamPJCksTGcctS2cEGr7d8V7-BWsW3VB8Fy344zaEBNbrcCAu0tO26nT_A/exec";
        let limit = 60; let mode = 'Income';
        const cats = {
            'Income': ['Workshops', 'Sales - Pottery', 'Sales - Embroidery', 'Sales - Hampers', 'Sales - Art', 'Misc/Others'],
            'Expense': ['Pottery Raw Materials', 'Other Raw Materials', 'Firing Charges', 'Packaging', 'Shipping Fees', 'Marketing', 'Vendor - Payment', 'Misc/Others']
        };
        
        document.getElementById('date').valueAsDate = new Date();
        function updateCats() { document.getElementById('category').innerHTML = cats[mode].map(c => `<option value="${c}">${c}</option>`).join(''); }
        
        // Tab switching logic
        document.getElementById('type-inc').onclick = () => { mode = 'Income'; updateCats(); document.getElementById('type-inc').className = "flex-1 py-2 text-xs font-bold rounded-lg bg-white shadow-sm"; document.getElementById('type-exp').className = "flex-1 py-2 text-xs font-bold text-stone-500"; };
        document.getElementById('type-exp').onclick = () => { mode = 'Expense'; updateCats(); document.getElementById('type-exp').className = "flex-1 py-2 text-xs font-bold rounded-lg bg-white shadow-sm"; document.getElementById('type-inc').className = "flex-1 py-2 text-xs font-bold text-stone-500"; };

        async function loadData() {
            const container = document.getElementById('table-container');
            const res = await fetch(`${API_URL}?limit=${limit}`);
            const data = await res.json();
            const grouped = data.reduce((acc, d, i) => {
                const month = new Date(d.date).toLocaleString('default', { month: 'long', year: 'numeric' });
                if (!acc[month]) acc[month] = []; acc[month].push({ ...d, originalIndex: i }); return acc;
            }, {});

            container.innerHTML = Object.keys(grouped).map((month, index) => `
                <details ${index === 0 ? 'open' : ''} class="group bg-white p-4 rounded-2xl border border-stone-100 shadow-sm">
                    <summary class="text-[10px] font-bold text-stone-400 uppercase tracking-widest cursor-pointer list-none flex justify-between items-center">
                        ${month} <span>▼</span>
                    </summary>
                    <div class="space-y-3 mt-4">
                        ${grouped[month].map(d => `
                            <div class="flex justify-between items-center border-t border-stone-100 pt-3">
                                <div class="truncate mr-2">
                                    <p class="text-[10px] font-bold text-stone-500 uppercase">${d.date} • ${d.category}</p>
                                    <p class="text-xs font-semibold text-stone-800 truncate">${d.description || 'No comment'}</p>
                                </div>
                                <div class="flex items-center gap-3">
                                    <p class="text-sm font-black ${d.type === 'Income' ? 'text-emerald-600' : 'text-rose-600'}">₹${d.amount}</p>
                                    <button onclick='editTransaction(${JSON.stringify(d)})' class="text-[10px] bg-stone-100 px-2 py-1 rounded">Edit</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </details>
            `).join('') + `<button onclick="loadMore()" class="w-full py-4 text-xs font-bold text-stone-400 underline">Load more...</button>`;
        }

        function editTransaction(d) {
            document.getElementById('edit-index').value = d.originalIndex;
            document.getElementById('date').value = d.date;
            document.getElementById('description').value = d.description;
            document.getElementById('amount').value = d.amount;
            // Set mode and category
            mode = d.type; updateCats(); document.getElementById('category').value = d.category;
            document.getElementById('submit-btn').textContent = "Update Transaction";
            window.scrollTo(0, 0);
        }

        document.getElementById('tx-form').onsubmit = async (e) => { 
            e.preventDefault(); 
            const index = document.getElementById('edit-index').value;
            const payload = { action: index ? 'edit' : 'add', index, date: document.getElementById('date').value, type: mode, category: document.getElementById('category').value, description: document.getElementById('description').value, amount: document.getElementById('amount').value };
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) }); 
            alert("Success!"); document.getElementById('tx-form').reset(); document.getElementById('edit-index').value = ""; document.getElementById('submit-btn').textContent = "Save Transaction"; loadData(); 
        };
        updateCats(); loadData();
    </script>
</body>
</html>
