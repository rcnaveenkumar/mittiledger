<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mitti Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-50 p-4 max-w-5xl mx-auto min-h-screen">
    <header class="mb-6 flex justify-between items-center">
        <h1 class="font-bold text-xl text-stone-800">Mitti Studio Ledger</h1>
        <a href="analytics.html" class="bg-stone-200 px-3 py-1 rounded-lg text-[10px] font-bold text-stone-800">Analytics →</a>
    </header>

    <div class="md:grid md:grid-cols-3 md:gap-8">
        <form id="tx-form" class="bg-white p-5 rounded-3xl shadow-sm border border-stone-100 space-y-4 mb-8">
            <input type="hidden" id="edit-index">
            <div class="flex p-1 bg-stone-100 rounded-xl">
                <button type="button" id="type-inc" class="flex-1 py-2 text-xs font-bold rounded-lg bg-white shadow-sm">Income</button>
                <button type="button" id="type-exp" class="flex-1 py-2 text-xs font-bold text-stone-500">Expense</button>
            </div>
            <input type="date" id="date" required class="w-full h-[50px] p-3 bg-stone-50 rounded-xl border border-stone-200">
            <select id="category" class="w-full p-3 bg-stone-50 rounded-xl border border-stone-200 text-sm"></select>
            <input type="text" id="description" placeholder="Description" class="w-full p-3 bg-stone-50 rounded-xl border border-stone-200">
            <input type="number" id="amount" placeholder="Amount (₹)" required class="w-full p-3 bg-stone-50 rounded-xl border border-stone-200 font-bold">
            <button type="submit" id="submit-btn" class="w-full bg-stone-800 text-white py-3 rounded-xl font-bold">Save Transaction</button>
        </form>
        <div id="table-container" class="md:col-span-2 space-y-4"></div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwj1DcGfxnnJvzbRoFRflWzy_INBD5q9U6N41OQbU7r71T64ZBgZXwHPU-5glc1g-3S4g/exec";
        let mode = 'Income';
        const cats = { 'Income': ['Workshops', 'Sales - Pottery', 'Sales - Embroidery', 'Sales - Hampers', 'Sales - Art', 'Misc/Others'], 'Expense': ['Pottery Raw Materials', 'Other Raw Materials', 'Firing Charges', 'Packaging', 'Shipping Fees', 'Marketing', 'Vendor - Payment', 'Misc/Others'] };
        
        function updateCats() { document.getElementById('category').innerHTML = cats[mode].map(c => `<option value="${c}">${c}</option>`).join(''); }
        function loadData() { const s = document.createElement('script'); s.src = `${API_URL}?callback=renderTable`; document.body.appendChild(s); }
        
        function renderTable(data) {
            data.sort((a, b) => new Date(b.date) - new Date(a.date));
            const container = document.getElementById('table-container');
            const grouped = data.reduce((acc, d, i) => { const m = new Date(d.date).toLocaleString('default', { month: 'long', year: 'numeric' }); if (!acc[m]) acc[m] = []; acc[m].push({ ...d, originalIndex: i }); return acc; }, {});
            container.innerHTML = Object.keys(grouped).map((m, i) => `<details ${i === 0 ? 'open' : ''} class="group bg-white p-4 rounded-2xl border border-stone-100 shadow-sm"><summary class="text-[10px] font-bold text-stone-400 uppercase tracking-widest cursor-pointer">${m}</summary><div class="space-y-3 mt-4">${grouped[m].map(d => `<div class="flex justify-between items-center border-t pt-3"><div><p class="text-[10px] font-bold text-stone-500 uppercase">${d.date} • ${d.category}</p><p class="text-xs font-semibold">${d.description || 'No comment'}</p></div><div class="flex items-center gap-3"><p class="text-sm font-black ${d.type === 'Income' ? 'text-emerald-600' : 'text-rose-600'}">₹${d.amount}</p><button onclick='editTransaction(${JSON.stringify(d)})' class="text-[10px] bg-stone-100 px-2 py-1 rounded">Edit</button></div></div>`).join('')}</div></details>`).join('');
        }

        document.getElementById('tx-form').onsubmit = async (e) => { 
            e.preventDefault(); 
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: document.getElementById('edit-index').value ? 'edit' : 'add', index: document.getElementById('edit-index').value, date: document.getElementById('date').value, type: mode, category: document.getElementById('category').value, description: document.getElementById('description').value, amount: document.getElementById('amount').value }) }); 
            alert("Success!"); loadData(); 
        };
        document.getElementById('type-inc').onclick = () => { mode = 'Income'; updateCats(); };
        document.getElementById('type-exp').onclick = () => { mode = 'Expense'; updateCats(); };
        updateCats(); loadData();
    </script>
</body>
</html>
