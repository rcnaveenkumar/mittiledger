<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mitti Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-50 p-4 max-w-sm mx-auto min-h-screen">
    <header class="mb-6 text-center"><h1 class="font-bold text-xl text-stone-800">Mitti Studio Ledger</h1></header>

    <form id="tx-form" class="bg-white p-5 rounded-3xl shadow-sm border border-stone-100 space-y-4 mb-8">
        <div class="flex p-1 bg-stone-100 rounded-xl">
            <button type="button" id="type-inc" class="flex-1 py-2 text-xs font-bold rounded-lg bg-white shadow-sm">Income</button>
            <button type="button" id="type-exp" class="flex-1 py-2 text-xs font-bold text-stone-500">Expense</button>
        </div>
        <input type="date" id="date" required 
               class="w-full h-[50px] p-3 bg-stone-50 rounded-xl border border-stone-200 block box-border">
        <select id="category" class="w-full p-3 bg-stone-50 rounded-xl border border-stone-200 text-sm"></select>
        <input type="text" id="description" placeholder="Description/Comment" class="w-full p-3 bg-stone-50 rounded-xl border border-stone-200">
        <input type="number" id="amount" placeholder="Amount (₹)" required class="w-full p-3 bg-stone-50 rounded-xl border border-stone-200 font-bold">
        <button type="submit" id="submit-btn" class="w-full bg-stone-800 text-white py-3 rounded-xl font-bold">Save Transaction</button>
    </form>

    <div id="table-container" class="space-y-4"></div>

    <script>
        const API_URL = "https://script.google.com/macros/library/d/1MKeWfoEKZ7AaIxWVcngQXeLpXHGa0YPhRtzpt7Vxf3L1ob648GAoXI5T/6";
        let limit = 60;
        let mode = 'Income';
        const cats = {'Income': ['Workshops', 'Custom Orders', 'Retail Sales', 'Other'], 'Expense': ['Raw Materials', 'Firing Costs', 'Studio Rent', 'Misc']};
        
        document.getElementById('date').valueAsDate = new Date();
        function updateCats() { document.getElementById('category').innerHTML = cats[mode].map(c => `<option value="${c}">${c}</option>`).join(''); }
        document.getElementById('type-inc').onclick = () => { mode = 'Income'; updateCats(); };
        document.getElementById('type-exp').onclick = () => { mode = 'Expense'; updateCats(); };

        async function loadData() {
            const container = document.getElementById('table-container');
            container.innerHTML = "<p class='text-center text-stone-400 text-xs'>Loading history...</p>";
            const res = await fetch(`${API_URL}?limit=${limit}`);
            const data = await res.json();
            
            const grouped = data.reduce((acc, d) => {
                const month = new Date(d.date).toLocaleString('default', { month: 'long', year: 'numeric' });
                if (!acc[month]) acc[month] = [];
                acc[month].push(d);
                return acc;
            }, {});

            container.innerHTML = Object.keys(grouped).map((month, index) => `
                <details ${index === 0 ? 'open' : ''} class="group bg-white p-4 rounded-2xl border border-stone-100 shadow-sm">
                    <summary class="text-[10px] font-bold text-stone-400 uppercase tracking-widest cursor-pointer list-none flex justify-between items-center">
                        ${month} <span>▼</span>
                    </summary>
                    <div class="space-y-3 mt-4">
                        ${grouped[month].map(d => `
                            <div class="flex justify-between items-center border-t border-stone-100 pt-3">
                                <div class="truncate mr-4">
                                    <p class="text-[10px] font-bold text-stone-500 uppercase">${d.date} • ${d.category}</p>
                                    <p class="text-xs font-semibold text-stone-800 truncate">${d.description || 'No comment'}</p>
                                </div>
                                <p class="text-sm font-black whitespace-nowrap ${d.type === 'Income' ? 'text-emerald-600' : 'text-rose-600'}">₹${d.amount}</p>
                            </div>
                        `).join('')}
                    </div>
                </details>
            `).join('') + `<button onclick="loadMore()" class="w-full py-4 text-xs font-bold text-stone-400 underline">Load more...</button>`;
        }

        function loadMore() { limit += 180; loadData(); }

        document.getElementById('tx-form').onsubmit = async (e) => { 
            e.preventDefault(); 
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({date: document.getElementById('date').value, type: mode, category: document.getElementById('category').value, description: document.getElementById('description').value, amount: document.getElementById('amount').value}) }); 
            alert("Success! Recorded.");
            document.getElementById('tx-form').reset(); loadData(); 
        };
        updateCats(); loadData();
    </script>
</body>
</html>
