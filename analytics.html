<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-50 p-4 max-w-sm mx-auto">
    <div class="mb-6"><a href="index.html" class="text-xs font-bold text-stone-400">← Back</a></div>
    <div class="bg-white p-6 rounded-3xl shadow-sm border border-stone-100">
        <canvas id="mainChart" style="height: 300px;"></canvas>
    </div>

    <script>
        Chart.register(ChartDataLabels);
        const API_URL = "https://script.google.com/macros/s/AKfycbyVnIp2ehLRKamPJCksTGcctS2cEGr7d8V7-BWsW3VB8Fy344zaEBNbrcCAu0tO26nT_A/exec";

        async function init() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                console.log("Data loaded:", data); // Check this in Inspect > Console
                
                new Chart(document.getElementById('mainChart'), {
                    type: 'bar',
                    data: {
                        labels: ['Summary'],
                        datasets: [
                            { label: 'Income', data: [data.filter(d=>d.type==='Income').reduce((a,b)=>a+Number(b.amount),0)], backgroundColor: '#10b981' },
                            { label: 'Expense', data: [data.filter(d=>d.type==='Expense').reduce((a,b)=>a+Number(b.amount),0)], backgroundColor: '#f43f5e' }
                        ]
                    },
                    options: { plugins: { datalabels: { anchor: 'end', align: 'top', formatter: v => '₹'+v } } }
                });
            } catch (err) {
                console.error("Error loading chart:", err);
                document.body.innerHTML += `<p class="text-red-500">Error: ${err.message}</p>`;
            }
        }
        init();
    </script>
</body>
</html>
