<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-50 p-4">
    <a href="index.html">← Back</a>
    <select id="time-view" class="w-full p-3 my-4 rounded-xl border">
        <option value="Month">Month-Year</option>
        <option value="Quarter">Quarter-Year</option>
    </select>
    <div class="bg-white p-6 rounded-3xl h-[350px]"><canvas id="mainChart"></canvas></div>

    <script>
        let rawData = [];
        const ctx = document.getElementById('mainChart').getContext('2d');
        let chart;

        async function init() {
            const res = await fetch("YOUR_SCRIPT_URL");
            rawData = await res.json();
            drawChart();
        }

        function drawChart() {
            // Group rawData by month and calculate Income, Expense, Profit
            const labels = ['Jan-26', 'Feb-26', 'Mar-26']; 
            const income = [45000, 32000, 52000];
            const expense = [22000, 25000, 28000];
            const profit = income.map((v, i) => v - expense[i]);

            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Income', data: income, backgroundColor: '#10b981' },
                        { label: 'Expense', data: expense, backgroundColor: '#f43f5e' },
                        { label: 'Profit', data: profit, backgroundColor: profit.map(v => v >= 0 ? '#3b82f6' : '#9333ea') }
                    ]
                },
                options: {
                    onClick: (e, el) => { if(el.length && el[0].datasetIndex < 2) drillDown(); }
                }
            });
        }

        function drillDown() {
            chart.destroy();
            chart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Pottery', 'Embroidery'],
                    datasets: [{ data: [15000, 10000], backgroundColor: ['#fbbf24', '#818cf8'] }]
                }
            });
        }
        init();
    </script>
</body>
</html>
